name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  compile_rust:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)
    uses: ./.github/workflows/compile_rust.yml

  zizmor:
    name: Zizmor check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # To associate results with action run
      security-events: write # To report results
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false

  analyze:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)
    timeout-minutes: 5
    strategy:
      matrix:
        dart: [dev]

    name: Analyze ${{ matrix.package }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - uses: dart-lang/setup-dart@v1
      with:
        sdk: ${{ matrix.dart }}
    - uses: actions/cache@v5
      with:
        path: "${{ env.PUB_CACHE }}"
        key: dart-dependencies-${{ matrix.dart }}-${{ runner.os }}
        restore-keys: |
          dart-dependencies-${{ matrix.dart }}-
          dart-dependencies-

    - name: Pub get
      run: dart pub get

    - name: Format dart
      run: |
        dart format --set-exit-if-changed .
    - name: Analyze
      run: dart analyze --fatal-infos .

  test:
    name: Dart tests
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)
    timeout-minutes: 10
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dart: [dev]
    needs: [compile_rust]
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - uses: dart-lang/setup-dart@v1
      with:
        sdk: ${{ matrix.dart }}
    - uses: actions/cache@v5
      with:
        path: "${{ env.PUB_CACHE }}"
        key: dart-dependencies-${{ matrix.dart }}-${{ runner.os }}
        restore-keys: |
          dart-dependencies-${{ matrix.dart }}-
          dart-dependencies-
    - name: Download libraries
      uses: actions/download-artifact@v8
      with:
        artifact-ids: ${{ needs.compile_rust.outputs.asset_id }}
        path: pkg/wasm_tools/
    - name: Inspect assets
      working-directory: pkg/wasm_tools
      run: |
        ls assets
        ls lib/src/wit_gen/precompiled/
    - name: Install wasm-tools
      uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
      with:
        tool: wasm-tools

    - name: Pub get
      run: dart pub get
    - name: Test wasm_tools
      working-directory: pkg/wasm_tools
      run: dart test
